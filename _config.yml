# QC Automation Agent - Program Wiki
# GitHub Pages configuration using Just the Docs theme

title: QC Automation Agent
description: Automated quality control for drilling data platforms
remote_theme: just-the-docs/just-the-docs

url: "https://robert-blue-datascience.github.io"
baseurl: "/qc-agent-wiki"

# Navigation structure
aux_links:
  "Repository":
    - "https://robert-blue-datascience.github.io/qc-agent-wiki"

# Footer
footer_content: "QC Automation Agent &mdash; Program Wiki"

# Search
search_enabled: true
search.heading_level: 3

# Mermaid support
mermaid:
  version: "10.9.0"

# Color scheme
color_scheme: light

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Callouts (for admonitions)
callouts:
  coming_soon:
    title: Coming Soon
    color: yellow
  note:
    title: Note
    color: blue
  important:
    title: Important
    color: red

# Exclude files from build
exclude:
  - "*.py"
  - "*.js"
  - "SPEC-*.md"
  - "CONTENT_MAP.md"
  - ".archive/"
  - "Gemfile.lock"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme